<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robot robot Studio</title>
    <!-- Core stable Blockly package link -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #121212; color: #fff; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #00878f; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 50px; box-sizing: border-box; }
        h1 { margin: 0; font-size: 1.2rem; }
        #container { display: flex; flex: 1; height: calc(100vh - 50px); }
        #chat { flex: 0.5; background-color: #181818; display: flex; flex-direction: column; padding: 15px; border-right: 1px solid #333; overflow-y: auto; }
        #blockly-wrapper { flex: 1.7; position: relative; height: 100%; }
        #blockly-area { position: absolute; top:0; bottom:0; left:0; right:0; width:100%; height:100%; }
        #code { flex: 0.6; background-color: #1e1e1e; padding: 15px; border-left: 1px solid #333; font-family: monospace; overflow: auto; white-space: pre-wrap; color: #a9dc76; margin: 0; }
        .msg { background: #2d2d2d; padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 8px; border-left: 3px solid #e47128; }
        .btn { background: #e47128; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>🤖 robot robot Studio Pro</h1>
        <button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('code').innerText); alert('C++ Code Copied!');">📋 Copy Code</button>
    </header>
    <div id="container">
        <div id="chat">
            <div class="msg">🎮 <b>All-Sensors Multi-Game Engine Activated!</b></div>
            <div class="msg">Your Roblox, Minecraft, and Pokémon categories are fully active. Hook real buttons, buzzers, or motors up to game loops!</div>
        </div>
        <div id="blockly-wrapper"><div id="blockly-area"></div></div>
        <pre id="code">// Drag a gaming loop onto the canvas to watch code build...</pre>
    </div>

    <!-- Multi-Game Fast Sidebar Toolbox Category Setup -->
    <xml id="toolbox" style="display: none">
        <category name="🎮 Roblox Core" colour="#e74c3c">
            <block type="roblox_event"></block>
        </category>
        <category name="⛏️ Minecraft Mod" colour="#2ecc71">
            <block type="minecraft_event"></block>
        </category>
        <category name="🎒 Pokémon GO" colour="#3498db">
            <block type="pokemon_event"></block>
        </category>
        <category name="🔌 Pin Outputs" colour="#00878f">
            <block type="pin_high"></block>
            <block type="pin_low"></block>
        </category>
        <category name="⚙️ Robotics Joint" colour="#e67e22">
            <block type="move_motor"></block>
        </category>
        <category name="🧠 Control Logic" colour="#9b59b6">
            <block type="delay_ms"></block>
        </category>
    </xml>

    <script>
        // Define clean custom block architectures local to the workspace engine
        Blockly.Blocks['roblox_event'] = { init: function() { this.appendDummyInput().appendField("🎮 Roblox Trigger:").appendField(new Blockly.FieldDropdown([["On Player Death 💀","DEATH"],["On Coin Collect 🪙","COIN"],["On Admin Mode Activated 👑","ADMIN"]]), "EV"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#e74c3c"); } };
        Blockly.Blocks['minecraft_event'] = { init: function() { this.appendDummyInput().appendField("⛏️ Minecraft Trigger:").appendField(new Blockly.FieldDropdown([["On Creeper Exploded 💥","CREEPER"],["On Diamond Mined 💎","DIAMOND"],["On Player Damaged 💔","DAMAGE"]]), "EV"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#2ecc71"); } };
        Blockly.Blocks['pokemon_event'] = { init: function() { this.appendDummyInput().appendField("🎒 Pokémon GO Trigger:").appendField(new Blockly.FieldDropdown([["On Pikachu Encountered ⚡","PIKA"],["On PokéStop Spun 🌀","STOP"],["On Gym Egg Hatched 🥚","EGG"]]), "EV"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#3498db"); } };
        
        Blockly.Blocks['pin_high'] = { init: function() { this.appendDummyInput().appendField("🔌 Turn ON Digital Pin #").appendField(new Blockly.FieldNumber(13, 0, 13), "PIN"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#00878f"); } };
        Blockly.Blocks['pin_low'] = { init: function() { this.appendDummyInput().appendField("🔌 Turn OFF Digital Pin #").appendField(new Blockly.FieldNumber(13, 0, 13), "PIN"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#00878f"); } };
        Blockly.Blocks['move_motor'] = { init: function() { this.appendDummyInput().appendField("⚙️ Steer Joint Pin #").appendField(new Blockly.FieldNumber(9, 0, 13), "PIN").appendField("to Angle").appendField(new Blockly.FieldNumber(90, 0, 180), "ANG"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#e67e22"); } };
        Blockly.Blocks['delay_ms'] = { init: function() { this.appendDummyInput().appendField("⏱️ Wait Delay").appendField(new Blockly.FieldNumber(1000, 0), "MS").appendField("ms"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour("#9b59b6"); } };

        // JavaScript code emission configuration profiles
        const generator = new Blockly.Generator('ARDUINO');
        generator.scrub_ = function(b, c, t) { const n = b.nextConnection && b.nextConnection.targetBlock(); return n && !t ? c + generator.blockToCode(n) : c; };
        
        generator['roblox_event'] = function(b) { return `  if (checkRobloxEvent("${b.getFieldValue('EV')}")) {\n`; };
        generator['minecraft_event'] = function(b) { return `  if (checkMinecraftEvent("${b.getFieldValue('EV')}")) {\n`; };
        generator['pokemon_event'] = function(b) { return `  if (checkPokemonEvent("${b.getFieldValue('EV')}")) {\n`; };
        
        generator['pin_high'] = function(b) { return `    digitalWrite(${b.getFieldValue('PIN')}, HIGH);\n`; };
        generator['pin_low'] = function(b) { return `    digitalWrite(${b.getFieldValue('PIN')}, LOW);\n`; };
        generator['move_motor'] = function(b) { return `    myServo.write(${b.getFieldValue('ANG')});\n`; };
        generator['delay_ms'] = function(b) { return `    delay(${b.getFieldValue('MS')});\n`; };

        // Inject the workspace container layout properties
        const ws = Blockly.inject('blockly-area', { toolbox: document.getElementById('toolbox'), grid: { spacing: 20, length: 3, colour: '#333', snap: true }, trashcan: true });
        setTimeout(() => { Blockly.svgResize(ws); }, 50);

        ws.addChangeListener(() => {
            const blockCode = generator.workspaceToCode(ws);
            let closing = (blockCode.match(/\{/g) || []).length;
            let braces = ''; for(let i=0; i<closing; i++) braces += "  }\n";
            document.getElementById('code').innerText = `void setup() {\n  Serial.begin(9600);\n}\n\nvoid loop() {\n${blockCode}${braces}\n}`;
        });
    </script>
</body>
</html>
