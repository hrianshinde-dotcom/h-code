<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robot robot Studio Pro</title>
    <style>
        /* Modern Neon Cyberpunk Theme */
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            margin: 0; padding: 0;
            background-color: #060608; color: #f0f0f5;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden;
        }
        
        /* Top Navigation App Header */
        header {
            background: linear-gradient(90deg, #004d52 0%, #00878f 100%);
            padding: 0 25px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0, 135, 143, 0.3); height: 65px; box-sizing: border-box;
            border-bottom: 2px solid #00f2ff;
        }
        h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; text-shadow: 0 0 10px #00f2ff; }
        
        .btn {
            background: linear-gradient(135deg, #e47128 0%, #ff8e42 100%); color: white; border: none;
            padding: 10px 20px; font-weight: bold; border-radius: 8px; font-size: 0.9rem;
            cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(228,113,40,0.3);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(228,113,40,0.5); }

        #workspace { display: flex; flex: 1; height: calc(100vh - 65px); width: 100vw; overflow: hidden; }

        /* Left Side: Control Panel & Sliders */
        #control-panel {
            width: 25vw; min-width: 280px; max-width: 350px;
            background-color: #0f0f14; border-right: 2px solid #1f1f2c;
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; gap: 20px;
        }
        .panel-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: #00f2ff; letter-spacing: 1px; margin-bottom: 5px; }
        .control-group { background: #161622; padding: 15px; border-radius: 10px; border: 1px solid #232330; }
        
        /* Interactive Slider styling */
        .slider { width: 100%; margin: 12px 0; accent-color: #e47128; cursor: pointer; }
        .stat-display { font-size: 1.1rem; font-weight: bold; color: #fff; margin-top: 5px; }

        /* Center Panel: Live Graph Display Canvas */
        #canvas-area { flex: 2; background-color: #0b0b0e; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #graph-container {
            flex: 1; background: #111116; border: 2px solid #232330; border-radius: 12px;
            position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 10px; gap: 4px;
            background-image: radial-gradient(#252538 1px, transparent 1px); background-size: 20px 20px;
        }
        .graph-bar { width: 100%; background: linear-gradient(0deg, #00878f, #00f2ff); border-radius: 4px 4px 0 0; transition: height 0.1s ease; }
        .graph-bar.alarm { background: linear-gradient(0deg, #c0392b, #ff4d4d) !important; box-shadow: 0 0 15px rgba(255,77,77,0.6); }

        /* Right Panel: Live C++ Serial Terminal Monitor Output */
        #terminal-area { width: 25vw; min-width: 280px; max-width: 350px; background-color: #070709; border-left: 2px solid #1f1f2c; display: flex; flex-direction: column; }
        .terminal-header { background-color: #141419; padding: 12px 18px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: #8f8fa3; border-bottom: 2px solid #1f1f2c; }
        pre { margin: 0; padding: 15px; flex: 1; overflow: auto; color: #5af78e; font-family: 'Consolas', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.4; }
    </style>
</head>
<body>

    <header>
        <h1>🤖 robot robot Studio Pro</h1>
        <button class="btn" onclick="copyArduinoCode()">📋 Copy Arduino C++ Code</button>
    </header>

    <div id="workspace">
        <!-- 1. LEFT PANEL: Controls & Threshold Toggles -->
        <div id="control-panel">
            <div>
                <div class="panel-title">📡 Hardware Setup</div>
                <div class="control-group">
                    <label for="sensor-select" style="font-size: 0.9rem; font-weight: bold;">Select Active Hardware Sensor:</label>
                    <select id="sensor-select" style="width: 100%; background: #0b0b0e; color: #fff; border: 1px solid #323247; padding: 8px; border-radius: 6px; margin-top: 8px; font-weight: bold;" onchange="changeSensor()">
                        <option value="📏 Distance Radar (Ultrasonic)">📏 Distance Radar (Ultrasonic)</option>
                        <option value="👁️ Light Eye (LDR Photocell)">👁️ Light Eye (LDR Photocell)</option>
                        <option value="🌡️ Thermometer (DHT11)">🌡️ Thermometer (DHT11)</option>
                        <option value="🔵 Bluetooth Packet Node">🔵 Bluetooth Packet Node</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="panel-title">🧠 Safety Parameters</div>
                <div class="control-group">
                    <label style="font-size: 0.9rem; font-weight: bold;">Adjust Alarm Threshold Limit:</label>
                    <input type="range" class="slider" id="limitSlider" min="0" max="1000" value="600" oninput="updateSliderDisplay()">
                    <div class="stat-display" id="sliderValDisplay">Limit Target: 600</div>
                </div>
            </div>

            <div>
                <div class="panel-title">🕹️ Diagnostics</div>
                <div class="control-group" style="text-align: center;">
                    <p style="font-size: 0.85rem; color: #a0a0b5; margin: 0 0 12px 0;">Test app calculations without real hardware connected:</p>
                    <button class="btn" id="streamBtn" onclick="toggleDataStream()" style="width: 100%;">▶️ Start Simulation</button>
                </div>
            </div>
        </div>

        <!-- 2. CENTER PANEL: Dynamic Visual Analytics Canvas -->
        <div id="canvas-area">
            <div class="panel-title" style="margin-left: 5px;">📊 Live Hardware Visual Data Matrix</div>
            <div id="graph-container">
                <!-- Data bars automatically inject here instantly -->
            </div>
        </div>

        <!-- 3. RIGHT PANEL: Automated C++ Script Compilation Code Console -->
        <div id="terminal-area">
            <div class="terminal-header">📝 Live Compiled Arduino Code (.ino)</div>
            <pre id="code-output">// App engine ready. Start the simulation to compile firmware tracks...</pre>
        </div>
    </div>

    <script>
        let isStreaming = false;
        let streamInterval = null;
        const totalBars = 35; // Maximum capacity display tracks
        let currentSensorName = "📏 Distance Radar (Ultrasonic)";

        // Initialize empty visual databar layout matrix container arrays
        const graphContainer = document.getElementById('graph-container');
        for (let i = 0; i < totalBars; i++) {
            const bar = document.createElement('div');
            bar.className = 'graph-bar';
            bar.style.height = '10%'; // Flat starting floor lines
            graphContainer.appendChild(bar);
        }

        function updateSliderDisplay() {
            const val = document.getElementById('limitSlider').value;
            document.getElementById('sliderValDisplay').innerText = "Limit Target: " + val;
            generateLiveCode();
        }

        function changeSensor() {
            currentSensorName = document.getElementById('sensor-select').value;
            generateLiveCode();
        }

        function toggleDataStream() {
            const btn = document.getElementById('streamBtn');
            if (isStreaming) {
                isStreaming = false;
                clearInterval(streamInterval);
                btn.innerText = "▶️ Start Simulation";
                btn.style.background = "linear-gradient(135deg, #e47128 0%, #ff8e42 100%)";
            } else {
                isStreaming = true;
                btn.innerText = "⏹️ Stop Simulation";
                btn.style.background = "linear-gradient(135deg, #c0392b 0%, #ff4d4d 100%)";
                streamInterval = setInterval(pushDataTelemetry, 120); // Fast sync data push cycle
            }
        }

        function pushDataTelemetry() {
            const bars = document.getElementsByClassName('graph-bar');
            const limit = parseInt(document.getElementById('limitSlider').value);
            
            // Push values along chart array lanes leftward
            for (let i = 0; i < bars.length - 1; i++) {
                bars[i].style.height = bars[i+1].style.height;
                if (bars[i+1].classList.contains('alarm')) {
                    bars[i].classList.add('alarm');
                } else {
                    bars[i].classList.remove('alarm');
                }
            }

            // Generate fresh random sensor reading index between 0 and 1000
            let newVal = Math.floor(Math.random() * 1001);
            let heightPercent = (newVal / 1000) * 100;
            
            const activeEntryBar = bars[bars.length - 1];
            activeEntryBar.style.height = heightPercent + '%';

            // Check if reading breaches user's slider setting limit threshold
            if (newVal > limit) {
                activeEntryBar.classList.add('alarm');
            } else {
                activeEntryBar.classList.remove('alarm');
            }
            
            generateLiveCode(newVal, limit);
        }

        function generateLiveCode(liveVal = 0, limitVal = 600) {
            if(!limitVal) limitVal = document.getElementById('limitSlider').value;
