<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Simple Click-to-Code Studio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
            background-color: #121212; color: #ffffff;
            overflow: hidden;
        }
        header {
            background-color: #00878f; /* Arduino Teal */
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            height: 60px; box-sizing: border-box;
        }
        h1 { margin: 0; font-size: 1.4rem; font-weight: 600; }
        .btn {
            background-color: #e47128; color: white; border: none;
            padding: 10px 16px; font-size: 0.95rem; font-weight: bold;
            border-radius: 6px; cursor: pointer; transition: 0.2s ease;
        }
        .btn:hover { background-color: #c55d1d; }
        
        #workspace-container {
            display: flex; flex: 1;
            height: calc(100vh - 60px); width: 100vw;
            overflow: hidden;
        }
        
        #ai-chat-area {
            width: 25vw; min-width: 280px; max-width: 350px;
            background-color: #181818; display: flex; flex-direction: column;
            border-right: 2px solid #2d2d2d;
        }
        
        #block-builder-area {
            flex: 2; height: 100%;
            background-color: #1e1e1e;
            display: flex; flex-direction: column;
        }
        .toolbox-bar {
            background-color: #252526; padding: 10px;
            display: flex; gap: 8px; flex-wrap: wrap;
            border-bottom: 2px solid #2d2d2d;
        }
        .tool-btn {
            color: white; border: none; padding: 8px 12px;
            font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 0.85rem;
        }
        .canvas-grid {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .kid-block {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; border-radius: 8px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); animation: popIn 0.2s ease;
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .remove-block-btn {
            background: none; border: none; color: white; 
            font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }
        
        #code-area {
            width: 25vw; min-width: 280px; max-width: 350px;
            background-color: #1e1e1e; border-left: 2px solid #2d2d2d;
            display: flex; flex-direction: column;
        }
        .panel-header {
            background-color: #252526; padding: 12px 15px;
            font-weight: bold; font-size: 0.85rem; text-transform: uppercase;
            border-bottom: 2px solid #2d2d2d; color: #cccccc;
        }
        pre {
            margin: 0; padding: 15px; flex: 1; overflow: auto;
            color: #a9dc76; font-family: 'Consolas', monospace;
            font-size: 0.9rem; white-space: pre-wrap; line-height: 1.4;
        }
        #chat-history { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; }
        .msg.user { background-color: #00878f; align-self: flex-end; }
        .msg.ai { background-color: #2d2d2d; align-self: flex-start; border-left: 3px solid #e47128; }
        .chat-input-bar { display: flex; padding: 12px; background-color: #212121; border-top: 1px solid #2d2d2d; gap: 8px; }
        .chat-input-bar input { flex: 1; background-color: #121212; border: 1px solid #3c3c3c; color: white; padding: 12px; border-radius: 6px; }
    </style>
</head>
<body>

    <header>
        <h1>🚀 Giant Kids Sensor Studio! 🦄</h1>
        <button class="btn" onclick="copyArduinoCode()">📋 Copy Magic Code</button>
    </header>

    <div id="workspace-container">
        <!-- 1. LEFT PANEL: Chat Workspace -->
        <div id="ai-chat-area">
            <div class="panel-header">✨ Step 1: Talk to your Robot Helper!</div>
            <div id="chat-history">
                <div class="msg ai">Hi friend! 👋 Click the colorful shape buttons at the top of the middle grid to build your tricks! No internet blocking can stop us now!</div>
            </div>
            <div class="chat-input-bar">
                <input type="text" id="chat-input" placeholder="Ask your robot friend a question..." onkeypress="handleChatKey(event)">
                <button class="btn" onclick="sendChatMessage()">Go!</button>
            </div>
        </div>

        <!-- 2. MIDDLE PANEL: Pure Local HTML Block Builder Canvas -->
        <div id="block-builder-area">
            <div class="toolbox-bar">
                <button class="tool-btn" style="background-color: #2ecc71;" onclick="addBlock('pir')">🏃 Motion Eye</button>
                <button class="tool-btn" style="background-color: #1abc9c;" onclick="addBlock('distance')">📏 Distance Radar</button>
                <button class="tool-btn" style="background-color: #3498db;" onclick="addBlock('light')">👁️ Light Eye</button>
                <button class="tool-btn" style="background-color: #f1c40f; color: #121212;" onclick="addBlock('temp')">🌡️ Thermometer</button>
                <button class="tool-btn" style="background-color: #1abc9c;" onclick="addBlock('water')">💧 Water Drop Sensor</button>
                <button class="tool-btn" style="background-color: #7f8c8d;" onclick="addBlock('button')">🔘 Big Button</button>
                <button class="tool-btn" style="background-color: #e74c3c;" onclick="addBlock('buzz')">🔊 Noise Maker ON</button>
                <button class="tool-btn" style="background-color: #e67e22;" onclick="addBlock('led_on')">💡 Red Light ON</button>
                <button class="tool-btn" style="background-color: #d35400;" onclick="addBlock('led_off')">💤 Red Light OFF</button>
                <button class="tool-btn" style="background-color: #9b59b6;" onclick="addBlock('wait')">⏱️ Wait 3 Seconds</button>
            </div>
            <div class="canvas-grid" id="canvasGrid">
                <!-- Clicked blocks will instantly render here dynamically -->
            </div>
        </div>
        
        <!-- 3. RIGHT PANEL: Live Generated Code Preview -->
        <div id="code-area">
            <div class="panel-header">📝 Step 2: Magic Code Output</div>
            <pre id="code-output">// Click the top buttons to see your real code write itself!</pre>
        </div>
    </div>

    <script>
        let activeBlocks = [];

        function addBlock(type) {
            activeBlocks.push(type);
            renderBlocks();
        }

        function removeBlock(index) {
            activeBlocks.splice(index, 1);
            renderBlocks();
        }

        function renderBlocks() {
            const grid = document.getElementById('canvasGrid');
            grid.innerHTML = ''; 
            
            let arduinoLoopCode = '';

            activeBlocks.forEach((block, index) => {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'kid-block';
                
                let label = '';
                if(block === 'pir') {
                    blockDiv.style.backgroundColor = '#2ecc71';
                    label = "🏃 IF Motion Sensor sees movement:";
                    arduinoLoopCode += "  if (digitalRead(2) == HIGH) {\n";
                } else if(block === 'distance') {
                    blockDiv.style.backgroundColor = '#1abc9c';
                    label = "📏 IF Radar Sensor tracks something close:";
                    arduinoLoopCode += "  if (getDistance() < 15) {\n";
                } else if(block === 'light') {
                    blockDiv.style.backgroundColor = '#3498db';
                    label = "👁️ IF Light Eye Sensor says it is Dark:";
                    arduinoLoopCode += "  if (analogRead(A1) < 300) {\n";
                } else if(block === 'temp') {
                    blockDiv.style.backgroundColor = '#f1c40f'; blockDiv.style.color = '#121212';
                    label = "🌡️ IF Thermometer feels Hot:";
                    arduinoLoopCode += "  if (analogRead(A2) > 150) {\n";
                } else if(block === 'water') {
                    blockDiv.style.backgroundColor = '#1abc9c';
                    label = "💧 IF Moisture Sensor touches water:";
                    arduinoLoopCode += "  if (analogRead(A0) > 400) {\n";
                } else if(block === 'button') {
                    blockDiv.style.backgroundColor = '#7f8c8d';
                    label = "🔘 IF Big Button is pressed:";
                    arduinoLoopCode += "  if (digitalRead(4) == LOW) {\n";
                } else if(block === 'buzz') {
                    blockDiv.style.backgroundColor = '#e74c3c';
                    label = "▶️ THEN DO: 🔊 Turn Noise Maker ON";
                    arduinoLoopCode += "    digitalWrite(3, HIGH);\n";
                } else if(block === 'led_on') {
                    blockDiv.style.backgroundColor = '#e67e22';
                    label = "▶️ THEN DO: 💡 Turn Red Light ON";
                    arduinoLoopCode += "    digitalWrite(13, HIGH);\n";
                } else if(block === 'led_off') {
                    blockDiv.style.backgroundColor = '#d35400';
                    label = "▶️ THEN DO: 💤 Turn Red Light OFF";
